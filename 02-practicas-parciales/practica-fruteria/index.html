<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de frutas</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/main.js" defer></script>
</head>

<body>

    <!-- Header -->
    <header class="header">

        <a href="index.html">
            <div class="logo">Frutería</div>
        </a>
        
        <div class="nombreAlumno"></div>
        
        <input type="text" placeholder="Buscar..." class="barra-busqueda">
        
        <div class="carrito">
            <span>Carrito: <span id="contador-carrito">0</span> productos</span>
        </div>
    </header>

    
    <!-- Contenedor principal -->
    <main>
		<section class="seccion-productos">
		    <h2>Nuestras frutas</h2>
		    <div class="ordenamiento-controles">
		        <button id="btn-ordenar-az">ordenar por nombre a-z</button>
		        <button id="btn-ordenar-za">ordenar por nombre z-a</button>
		        <button id="btn-ordenar-precio-menor">ordenar por menor precio</button>
		        <button id="btn-ordenar-precio-mayor">ordenar por mayor precio</button>
		    </div>
		    <div class="contenedor-productos"></div>
		</section>


		<!-- Seccion carrito -->
		<section class="seccion-carrito">
		    <h2>Carrito</h2>
		    
		    <div id="items-carrito">
		        <p>No hay elementos en el carrito.</p>
		    </div>

		    <div class="total-carrito">
		        <p>Total: <span id="precio-total">$0.00</span></p>
		        <button id="btn-vaciar-carrito" class="boton-vaciar">Vaciar Carrito</button>
		    </div>
		</section>

    </main>
</body>
</html>
